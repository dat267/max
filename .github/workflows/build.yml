name: Build

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p build
          # Always output to 'build/max', handle .exe for windows if necessary, 
          # but the user requested the name 'max'. 
          # Note: Windows usually requires .exe to be executable, but we will name it 'max' as requested.
          OUTPUT_NAME="max"
          go build -v -o build/${OUTPUT_NAME} ./cmd/max
          # Ensure env vars are set properly for the next step
          echo "ASSET_PATH=build/${OUTPUT_NAME}" >> $GITHUB_ENV
          echo "ASSET_NAME=${OUTPUT_NAME}" >> $GITHUB_ENV
      
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.ASSET_PATH }}
          asset_name: ${{ env.ASSET_NAME }}
          tag: ${{ github.ref }}
          overwrite: true
